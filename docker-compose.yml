services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - app-network

  laravel:
    build:
      context: .
      dockerfile: docker/laravel.Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      OCTANE_SERVER: roadrunner
      # پورت در اینجا از 8002 به 8082 اصلاح شد
      TELEGRAM_API_URL: ${TELEGRAM_API_URL:-http://telegram-reporter:8082}
      DB_CONNECTION: sqlite
      DB_HOST: mariadb
      DB_PORT: 3306
      #DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-laravel_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/var/www/html/storage
      - ./database:/var/www/html/database
    depends_on:
      - mariadb
      - sms
      - telegram-reporter
    networks:
      - app-network

  queue:
    build:
      context: .
      dockerfile: docker/laravel.Dockerfile
    command: php artisan queue:work --tries=3 --timeout=90
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      TELEGRAM_API_URL: ${TELEGRAM_API_URL:-http://telegram-bot-api:8081}
      DB_CONNECTION: sqlite
      DB_HOST: mariadb
      DB_PORT: 3306
      #DB_DATABASE: ${DB_DATABASE:-laravel}
      DB_USERNAME: ${DB_USERNAME:-laravel_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./storage:/var/www/html/storage
      - ./database:/var/www/html/database
    depends_on:
      - mariadb
    networks:
      - app-network

  sms:
    build:
      context: .
      dockerfile: docker/sms.Dockerfile
    environment:
      SMTP_HOST: ${SMTP_HOST:-mail.mozahemyab.online}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-info@mozahemyab.online}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    ports:
      - "8083:8083"
    networks:
      - app-network

  form:
    build:
      context: .
      dockerfile: docker/form.Dockerfile
    ports:
      - "8084:8084"
    networks:
      - app-network

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-2040}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-b18441a1ff607e10a989891a5462e627}
      TELEGRAM_LOCAL: 1
    ports:
      - "8081:8081"
    volumes:
      - telegram_bot_api_data:/var/lib/telegram-bot-api
    networks:
      - app-network

  telegram-reporter:
    build:
      context: .
      dockerfile: docker/telegram-reporter.Dockerfile
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-2040}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-b18441a1ff607e10a989891a5462e627}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-8249697674:AAE9BF09Vy9jhe3q3UkQlCFLaqnldekLw_w}
      TELEGRAM_ALLOWED_IDS: ${TELEGRAM_ALLOWED_IDS:-8200290641,772127505}
      TELEGRAM_SESSION_DB: /data/sessions.db
      TELEGRAM_TMP_DIR: /tmp/telegram-reporter
      TELEGRAM_BOT_PROXY: ${TELEGRAM_BOT_PROXY:-}
      TELEGRAM_AGENT_PROXIES: ${TELEGRAM_AGENT_PROXIES:-}
    volumes:
      - telegram_sessions:/data
      - telegram_tmp:/tmp/telegram-reporter
    ports:
      - "8082:8082"
    depends_on:
      - telegram-bot-api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  telegram_sessions:
  telegram_tmp:
  telegram_bot_api_data:
  mariadb_data:
